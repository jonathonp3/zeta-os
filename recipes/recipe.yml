---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: zeta-os
description: My personal Bazzite-based OS image for the family.

base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: latest

modules:
  # 1.File Overlays (Bazzite/Wolf-OS style)
  - type: files
    files:
      - source: etc
        destination: /etc
      - source: usr
        destination: /usr
      - source: tmp/pia-backup.tar.xz
        destination: /tmp/pia-backup.tar.xz
      - source: usr/share/gtksourceview-5/styles
        destination: /usr/share/gtksourceview-5/styles

  # 2.Modular Repos and Packages
  - from-file: ../modules/repository.yml
  - from-file: ../modules/packages.yml
  # Remove gnome-text-editor flatpak on boot (using custom rpm)
  - source: usr/libexec/wolf-os-firstboot.sh
    destination: /usr/libexec/wolf-os-firstboot.sh
  - source: usr/lib/systemd/system/wolf-os-cleanup.service
    destination: /usr/lib/systemd/system/wolf-os-cleanup.service  
  
  
  # 3: Custom Assembly (The Script)
  - type: script
    scripts:
      - setup-zeta-os.sh

  # 4: Security
  - type: signing

